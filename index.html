<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HotelStock Pro V4.0 - Applicazione web per la gestione logistica e delle scorte per Hotel.">
    <meta name="theme-color" content="#2563eb">
    <!-- Favicon universale SVG (evita errori 404 su GitHub Pages) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏨</text></svg>">
    
    <title>HotelStock Pro V4.0 - Logistica Integrata</title>
    
    <script>
        // Inizializza subito il tema per evitare "lampi" bianchi (FOUC)
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script>
        tailwind = {
            config: {
                darkMode: 'class',
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; }
        .dark .tab-active { border-bottom: 2px solid #60a5fa; color: #60a5fa; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        .version-badge { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .truncate-cell { max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-clickable:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">

    <div id="app" class="flex flex-col h-screen">
        <!-- Header -->
        <header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-6 py-4 flex flex-wrap justify-between items-center shrink-0 gap-4 transition-colors duration-200">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-100 dark:shadow-none">
                    <i data-lucide="hotel" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight leading-none text-slate-800 dark:text-white">HotelStock <span class="text-blue-600 dark:text-blue-400">Pro</span> <span class="align-middle text-[10px] bg-blue-100 dark:bg-blue-900/50 text-blue-800 dark:text-blue-200 px-2 py-0.5 rounded-full ml-1 font-extrabold uppercase tracking-widest border border-blue-200 dark:border-blue-700 shadow-sm">V4.0 Stabile</span></h1>
                    <div id="active-season-indicator" class="flex items-center gap-1 mt-1 text-[10px] font-bold uppercase text-blue-500 dark:text-blue-400 tracking-tighter"></div>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl text-slate-600 dark:text-slate-300 transition-all border border-transparent dark:border-slate-600" title="Cambia Tema">
                    <i data-lucide="moon" id="dark-mode-icon" class="w-4 h-4"></i>
                </button>

                <div class="flex items-center gap-2 bg-slate-50 dark:bg-slate-900 p-1.5 rounded-xl border border-slate-200 dark:border-slate-700">
                    <i data-lucide="history" class="w-4 h-4 text-slate-400 dark:text-slate-500 ml-2"></i>
                    <select id="version-selector" onchange="restoreVersion(this.value)" class="bg-transparent text-sm font-medium focus:outline-none pr-4 cursor-pointer text-slate-700 dark:text-slate-200">
                        <option value="" class="dark:bg-slate-800">Cronologia Versioni...</option>
                    </select>
                    <button onclick="createManualVersion()" class="p-1.5 hover:bg-white dark:hover:bg-slate-700 hover:shadow-sm rounded-lg text-blue-600 dark:text-blue-400 transition-all" title="Crea punto di ripristino">
                        <i data-lucide="save" class="w-4 h-4"></i>
                    </button>
                </div>
                
                <div id="user-profile" class="hidden items-center gap-2 bg-blue-50 dark:bg-blue-900/30 p-1.5 px-3 rounded-xl border border-blue-100 dark:border-blue-800">
                    <i data-lucide="user" class="w-4 h-4 text-blue-600 dark:text-blue-400"></i>
                    <span id="current-username" class="text-sm font-bold text-blue-800 dark:text-blue-200"></span>
                    <button onclick="logout()" class="ml-2 p-1 hover:bg-white dark:hover:bg-blue-800 rounded-lg text-blue-600 dark:text-blue-400 transition-all" title="Esci">
                        <i data-lucide="log-out" class="w-3 h-3"></i>
                    </button>
                </div>
            </div>

            <div class="flex gap-1" id="main-nav">
                <button onclick="switchTab('dashboard')" class="nav-btn px-4 py-2 text-sm font-semibold transition-all rounded-lg dark:text-slate-300 dark:hover:text-blue-400" data-tab="dashboard">Dashboard</button>
                <button onclick="switchTab('movements')" class="nav-btn px-4 py-2 text-sm font-semibold transition-all rounded-lg dark:text-slate-300 dark:hover:text-blue-400" data-tab="movements">Movimenti</button>
                <button onclick="switchTab('stock')" class="nav-btn px-4 py-2 text-sm font-semibold transition-all rounded-lg dark:text-slate-300 dark:hover:text-blue-400" data-tab="stock">Giacenze</button>
                <button onclick="switchTab('documents')" class="nav-btn px-4 py-2 text-sm font-semibold transition-all rounded-lg dark:text-slate-300 dark:hover:text-blue-400" data-tab="documents">Documenti</button>
                <button onclick="switchTab('registry')" class="nav-btn px-4 py-2 text-sm font-semibold transition-all rounded-lg dark:text-slate-300 dark:hover:text-blue-400" data-tab="registry">Anagrafiche</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 overflow-hidden p-4 md:p-6">
            <div id="content-area" class="h-full overflow-y-auto custom-scrollbar"></div>
        </main>

        <!-- Notification -->
        <div id="notification" class="fixed bottom-6 right-6 transform translate-y-20 transition-transform duration-300 bg-slate-800 dark:bg-slate-700 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 z-50">
            <i data-lucide="info" class="w-5 h-5 text-blue-400"></i>
            <span id="notification-text">Messaggio</span>
        </div>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-40 backdrop-blur-sm p-4 transition-opacity" onclick="handleOverlayClick(event)">
        <div id="modal-content" class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl w-full max-w-2xl p-6 overflow-hidden border border-white/20 dark:border-slate-600 transition-colors" onclick="event.stopPropagation()"></div>
    </div>

    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[60] p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl w-full max-w-sm p-8 text-center border border-transparent dark:border-slate-700 transition-colors">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl shadow-lg shadow-blue-200 dark:shadow-none flex items-center justify-center mx-auto mb-6">
                <i data-lucide="lock" class="text-white w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-2">Accesso Riservato</h2>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-8">Seleziona il tuo profilo e inserisci la password</p>
            
            <form id="login-form" class="space-y-4 text-left" onsubmit="handleLogin(event)">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Utente</label>
                    <select id="login-user-select" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none font-medium bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-white transition-colors">
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Password</label>
                    <input type="password" id="login-pin" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none font-mono text-center tracking-[0.5em] text-lg bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-white transition-colors" placeholder="••••">
                </div>
                <p id="login-error" class="text-red-500 text-xs font-bold hidden text-center mt-2">Credenziali Errate. Riprova.</p>
                <button type="submit" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-blue-200 dark:shadow-none hover:bg-blue-700 active:scale-95 transition-all mt-4">Accedi</button>
            </form>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[70] text-white flex-col gap-4 transition-opacity duration-300">
        <i data-lucide="cloud-sync" class="w-12 h-12 animate-pulse text-blue-500"></i>
        <p class="font-bold tracking-widest text-sm text-slate-300 uppercase">Sincronizzazione Cloud...</p>
    </div>

    <script>
        // --- 1. GLOBAL VARIABLES & STATE ---
        var state = {};
        
        const STORAGE_KEY = 'hotel_stock_v4';
        const MAX_HISTORY = 10; 
        let myCharts = {};
        let currentUser = null;

        let pendingBollaItems = [];
        let currentBollaSupplierId = "";
        let currentBollaDocTypeId = "";
        let currentBollaDocRef = "";
        let editingBollaId = null;

        let pendingDischargeItems = [];
        let currentDischargeOutletId = "";
        let pendingInventoryItems = [];
        let pendingNewItems = [];
        
        let stockSortCol = 'name';
        let stockSortAsc = true;
        let stockFilterSupplier = '';
        let expandedDocumentId = null;
        let docFilterSearch = '';
        let docFilterDate = '';
        let docFilterSupplier = '';

        // --- 2. UTILITY FUNCTIONS ---
        window.showNotification = function(text) {
            const t = document.getElementById('notification');
            const textEl = document.getElementById('notification-text');
            if(t && textEl) {
                textEl.innerText = text;
                t.style.transform = 'translateY(0)';
                setTimeout(() => t.style.transform = 'translateY(5rem)', 3000);
            }
        };

        window.toggleDarkMode = function() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            window.updateDarkModeIcon();
            if(state.activeTab === 'dashboard') window.renderCharts(); 
        };

        window.updateDarkModeIcon = function() {
            const icon = document.getElementById('dark-mode-icon');
            if (icon) {
                icon.setAttribute('data-lucide', document.documentElement.classList.contains('dark') ? 'sun' : 'moon');
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }
        };

        window.getCategoryName = function(id) { return state.categories.find(c => c.id === id)?.name || '-'; };
        window.getSeasonName = function(id) { return state.seasons.find(s => s.id === id)?.name || 'N.D.'; };
        window.getUomName = function(id) { const u = state.uoms.find(u => u.id === id); return u ? u.name.split('(')[1]?.replace(')','') || u.name : 'PZ'; };
        window.getDocTypeName = function(id) { return state.documentTypes.find(dt => dt.id === id)?.name || "Bolla"; };

        window.openModal = function(html) { 
            const c = document.getElementById('modal-content'); 
            if (html !== '') c.innerHTML = html; 
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex'); 
            if (typeof lucide !== 'undefined') lucide.createIcons(); 
        };
        
        window.closeModal = function() { 
            document.getElementById('modal-overlay').classList.replace('flex', 'hidden'); 
            editingBollaId = null; pendingBollaItems = []; pendingDischargeItems = []; pendingInventoryItems = []; pendingNewItems = [];
        };

        window.handleOverlayClick = function(e) { if (e.target.id === 'modal-overlay') window.closeModal(); };

        // --- 3. INIT & CORE FLOW ---
        window.initCloudData = function(cloudState) {
            try {
                const defaultState = {
                    items: [], categories: [], uoms: [], suppliers: [], seasons: [], outlets: [], 
                    documentTypes: [{id: 'dt1', name: 'Bolla'}, {id: 'dt2', name: 'DDT'}, {id: 'dt3', name: 'Scontrino'}, {id: 'dt4', name: 'Fattura Acc.'}], 
                    users: [{id: 'u-admin', username: 'admin', password: 'admin', role: 'Amministratore'}],
                    currentSeasonId: null, movements: [], bolle: [], versionHistory: [],
                    activeTab: 'dashboard', dashboardFilter: 'current', registrySeasonFilter: 'current'
                };

                if (cloudState) {
                    state = { ...defaultState, ...cloudState };
                } else {
                    const savedState = localStorage.getItem(STORAGE_KEY);
                    if (savedState) {
                        try {
                            const parsedState = JSON.parse(savedState);
                            state = { ...defaultState, ...parsedState };
                        } catch (e) { 
                            console.error("Errore parsing dati", e); 
                            state = { ...defaultState };
                        }
                    } else {
                        state = { ...defaultState };
                        state.categories = [{id: 'c1', name: 'Alimentari'}, {id: 'c2', name: 'Pulizia'}, {id: 'c3', name: 'Beverage'}];
                        state.uoms = [{id: 'u1', name: 'Pezzi (PZ)'}, {id: 'u2', name: 'Kg'}, {id: 'u3', name: 'Litri (L)'}];
                        state.seasons = [{id: 's1', name: 'Inverno 2024/25'}, {id: 's2', name: 'Estate 2025'}];
                        state.outlets = [{id: 'o1', name: 'Bar Centrale', budget: 1000}, {id: 'o2', name: 'Ristorante', budget: 500}];
                        state.suppliers = [{id: 'f1', name: 'Fornitore Test SRL', contactPerson: 'Mario', phone: '02-123456', email: 'test@email.it'}];
                        state.currentSeasonId = 's1';
                        window.saveData(false, "Inizializzazione");
                    }
                }
                
                // Sicurezza: Forza tutti gli array ad esistere anche se corrotti
                ['items', 'categories', 'uoms', 'suppliers', 'seasons', 'outlets', 'documentTypes', 'users', 'movements', 'bolle', 'versionHistory'].forEach(key => {
                    if (!Array.isArray(state[key])) state[key] = defaultState[key] || [];
                });

                window.addEventListener('keydown', (e) => { if (e.key === 'Escape') window.closeModal(); });
                window.updateVersionSelector();
                window.updateSeasonIndicator();
                window.updateDarkModeIcon();
                window.render();
                
                if (!currentUser) window.renderLogin();
                
                if (typeof lucide !== 'undefined') lucide.createIcons();

            } catch(error) {
                console.error("Errore critico durante l'inizializzazione:", error);
            } finally {
                // Rimuove sempre la schermata di caricamento
                const loader = document.getElementById('loading-overlay');
                if(loader) {
                    loader.classList.add('opacity-0');
                    setTimeout(() => {
                        loader.classList.add('hidden');
                        loader.classList.remove('flex');
                    }, 300);
                }
            }
        };

        window.renderLogin = function() {
            const select = document.getElementById('login-user-select');
            if(select) {
                select.innerHTML = state.users.map(u => `<option value="${u.id}" class="dark:bg-slate-800">${u.username}</option>`).join('');
            }
            document.getElementById('login-pin').value = '';
            document.getElementById('login-error').classList.add('hidden');
            document.getElementById('login-overlay').classList.remove('hidden');
            document.getElementById('user-profile').classList.add('hidden');
            document.getElementById('user-profile').classList.remove('flex');
            document.getElementById('app').classList.add('blur-sm', 'pointer-events-none');
        };

        window.handleLogin = function(e) {
            if(e) e.preventDefault();
            const userId = document.getElementById('login-user-select').value;
            const pinInput = document.getElementById('login-pin');
            const pin = pinInput.value;
            const user = state.users.find(u => u.id === userId);
            
            if (user && user.password === pin) {
                currentUser = user;
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('app').classList.remove('blur-sm', 'pointer-events-none');
                document.getElementById('user-profile').classList.remove('hidden');
                document.getElementById('user-profile').classList.add('flex');
                document.getElementById('current-username').innerText = user.username;
                window.showNotification(`Accesso effettuato come ${user.username}`);
                pinInput.value = ''; 
            } else {
                document.getElementById('login-error').classList.remove('hidden');
                pinInput.value = ''; 
                pinInput.focus();
            }
        };

        window.logout = function() {
            currentUser = null;
            state.activeTab = 'dashboard'; 
            window.closeModal(); 
            window.render();
            window.renderLogin();
            window.showNotification("Disconnesso con successo");
        };

        window.saveData = function(createSnapshot = true, label = "Aggiornamento dati") {
            if (createSnapshot) {
                const snapshot = {
                    id: Date.now(),
                    timestamp: new Date().toLocaleString('it-IT'),
                    label: label,
                    data: JSON.parse(JSON.stringify({
                        items: state.items, categories: state.categories, uoms: state.uoms,
                        suppliers: state.suppliers, seasons: state.seasons, outlets: state.outlets,
                        documentTypes: state.documentTypes, users: state.users, currentSeasonId: state.currentSeasonId,
                        movements: state.movements, bolle: state.bolle
                    }))
                };
                if(!state.versionHistory) state.versionHistory = [];
                state.versionHistory.unshift(snapshot);
                if (state.versionHistory.length > MAX_HISTORY) state.versionHistory.pop(); 
            }
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch (e) {
                if (e.name === 'QuotaExceededError') {
                    state.versionHistory = state.versionHistory.slice(0, 3);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
                }
            }
            window.updateVersionSelector();
            window.updateSeasonIndicator();

            if (typeof window.onSaveToCloud === 'function') {
                window.onSaveToCloud(state);
            }
        };

        window.updateVersionSelector = function() {
            const selector = document.getElementById('version-selector');
            if (!selector) return;
            selector.innerHTML = '<option value="" class="dark:bg-slate-800">Cronologia Versioni...</option>';
            if(state.versionHistory && Array.isArray(state.versionHistory)){
                state.versionHistory.forEach((v, index) => {
                    const option = document.createElement('option');
                    option.value = index; option.className = "dark:bg-slate-800"; option.textContent = `${v.timestamp} - ${v.label}`;
                    selector.appendChild(option);
                });
            }
        };

        window.updateSeasonIndicator = function() {
            const indicator = document.getElementById('active-season-indicator');
            if (!indicator) return;
            const season = (state.seasons || []).find(s => s.id === state.currentSeasonId);
            indicator.innerHTML = season 
                ? `<i data-lucide="sun" class="w-3 h-3 text-orange-400"></i> Stagione: ${season.name}`
                : `<i data-lucide="alert-circle" class="w-3 h-3 text-red-400"></i> No Stagione`;
            if (typeof lucide !== 'undefined') lucide.createIcons();
        };
        
        window.setCurrentSeason = function(id) {
            state.currentSeasonId = id;
            window.saveData(true, "Cambio stagione attiva");
            window.render();
            window.showNotification("Stagione impostata come attiva");
        };

        window.restoreVersion = function(index) {
            if (index === "") return;
            const version = state.versionHistory[index];
            window.openModal(`
                <div class="text-center p-4">
                    <h3 class="text-xl font-bold mb-2 text-slate-800 dark:text-white">Ripristina Backup</h3>
                    <p class="text-slate-500 dark:text-slate-400 mb-6 text-sm italic">Ripristinare lo stato del ${version.timestamp}?</p>
                    <div class="flex gap-3">
                        <button onclick="closeModal()" class="flex-1 px-4 py-2 border border-slate-200 dark:border-slate-600 rounded-xl font-medium hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 transition-colors">Annulla</button>
                        <button onclick="confirmRestore(${index})" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded-xl font-bold shadow-lg">Ripristina</button>
                    </div>
                </div>
            `);
        };

        window.confirmRestore = function(index) {
            const versionData = state.versionHistory[index].data;
            const history = state.versionHistory; 
            state = { ...versionData, versionHistory: history, activeTab: state.activeTab };
            window.saveData(false); window.closeModal(); window.render(); window.showNotification("Backup ripristinato");
            document.getElementById('version-selector').value = "";
        };

        window.createManualVersion = function() { window.saveData(true, "Manuale"); window.showNotification("Versione salvata"); };
        window.switchTab = function(tab) { state.activeTab = tab; window.render(); };

        window.updateNavStyles = function() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('tab-active', 'bg-blue-50', 'dark:bg-blue-900/30', 'text-blue-600', 'dark:text-blue-400');
                if (btn.dataset.tab === state.activeTab) btn.classList.add('tab-active', 'bg-blue-50', 'dark:bg-blue-900/30', 'text-blue-600', 'dark:text-blue-400');
            });
        };

        window.render = function() {
            const container = document.getElementById('content-area');
            window.updateNavStyles();
            switch(state.activeTab) {
                case 'dashboard': window.renderDashboard(container); break;
                case 'movements': window.renderMovements(container); break;
                case 'stock': window.renderStock(container); break;
                case 'documents': window.renderDocuments(container); break;
                case 'registry': window.renderRegistry(container); break;
            }
            if (typeof lucide !== 'undefined') lucide.createIcons();
        };

        // --- 4. RENDER FUNCTIONS (VIEWS) ---
        window.renderDashboard = function(container) {
            const filteredItems = state.dashboardFilter === 'current' ? state.items.filter(i => i.seasonId === state.currentSeasonId) : state.items;
            const lowStockItems = filteredItems.filter(i => i.currentStock <= i.reorderLevel);
            const totalCostValue = filteredItems.reduce((acc, i) => acc + (i.currentStock * i.lastPrice), 0);
            
            const totalSaleValue = state.movements.filter(mv => {
                if (mv.type !== 'OUT') return false;
                const item = state.items.find(i => i.id === mv.itemId);
                return state.dashboardFilter === 'all' || (item && item.seasonId === state.currentSeasonId);
            }).reduce((acc, mv) => acc + (mv.quantity * mv.price), 0);

            const topByValue = [...filteredItems].sort((a, b) => (b.currentStock * b.lastPrice) - (a.currentStock * a.lastPrice)).slice(0, 5);
            const topByQty = [...filteredItems].sort((a, b) => b.currentStock - a.currentStock).slice(0, 5);
            
            const catSummary = {};
            filteredItems.forEach(item => {
                const catName = window.getCategoryName(item.categoryId);
                if(!catSummary[catName]) catSummary[catName] = { value: 0, qty: 0 };
                catSummary[catName].value += (item.currentStock * item.lastPrice);
                catSummary[catName].qty += item.currentStock;
            });
            
            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();
            const outletSpending = {};
            state.outlets.forEach(o => { outletSpending[o.id] = { name: o.name, budget: o.budget || 0, spent: 0 }; });
            state.movements.forEach(mv => {
                if (mv.type === 'OUT' && mv.outletId) {
                    const parts = mv.date.split('/'); 
                    if (parts.length === 3) {

            const catValueData = {}, catQtyData = {}, supplierSpend = {}, salesByCategoryData = {};

                const catName = window.getCategoryName(item.categoryId);
                catValueData[catName] = (catValueData[catName] || 0) + (item.currentStock * item.lastPrice);
                catQtyData[catName] = (catQtyData[catName] || 0) + item.currentStock;
            });
            state.bolle.forEach(b => {
                const supName = state.suppliers.find(s => s.id === b.supplierId)?.name || 'N.D.';
                const bollaVal = b.movementsIds.reduce((acc, mid) => {
                    const mv = state.movements.find(m => m.id === mid);
                    return acc + (mv ? mv.quantity * mv.price : 0);
                }, 0);
                if(bollaVal > 0) supplierSpend[supName] = (supplierSpend[supName] || 0) + bollaVal;
            });
            state.movements.forEach(mv => {
                if (mv.type === 'OUT') {
                    const item = state.items.find(i => i.id === mv.itemId);
                    if (state.dashboardFilter === 'all' || (item && item.seasonId === state.currentSeasonId)) {
                        const catName = item ? window.getCategoryName(item.categoryId) : 'Eliminati/Sconosciuti';
                        salesByCategoryData[catName] = (salesByCategoryData[catName] || 0) + (mv.quantity * mv.price);
                    }
                }
            });

            const isDark = document.documentElement.classList.contains('dark');
            Chart.defaults.color = isDark ? '#94a3b8' : '#64748b';
            Chart.defaults.borderColor = isDark ? '#334155' : '#e2e8f0';

            const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#64748b', '#14b8a6', '#f43f5e', '#84cc16'];
            const commonOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: {size: 10} } } } };

            function createChartConfig(dataObj, type, onClickCallback, isCurrency = true) {
                const hasData = Object.keys(dataObj).length > 0;
                return {
                    type: type,
                    data: {
                        labels: hasData ? Object.keys(dataObj) : ['Nessun Dato'],
                        datasets: [{ data: hasData ? Object.values(dataObj) : [1], backgroundColor: hasData ? colors : (isDark ? ['#334155'] : ['#e2e8f0']), borderWidth: isDark ? 2 : 0, borderColor: isDark ? '#1e293b' : '#ffffff', hoverOffset: hasData ? 5 : 0 }]
                    },
                    options: {
                        ...commonOptions,
                        plugins: {
                            ...commonOptions.plugins,
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        if (!hasData) return 'Nessun Dato';
                                        const value = context.parsed;
                                        const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                        const pct = total > 0 ? ((value / total) * 100).toFixed(1) + '%' : '0%';
                                        return isCurrency ? `${context.label}: € ${value.toFixed(2)} (${pct})` : `${context.label}: ${value} pz (${pct})`;
                                    }
                                }
                            }
                        },
                        onHover: (event, chartElement) => { event.native.target.style.cursor = chartElement[0] && hasData ? 'pointer' : 'default'; },
                        onClick: (event, elements, chart) => {
                            if (!hasData || elements.length === 0) return;
                            const index = elements[0].index;
                            const label = chart.data.labels[index];
                            if (onClickCallback) onClickCallback(label);
                        }
                    }
                };

                document.getElementById('inv-system-qty').value = item.currentStock; 
                document.getElementById('inv-actual-qty').value = item.currentStock; 
            }
        };

        window.addPendingItemToInventory = () => { 
            const itemId = document.getElementById('inv-entry-item').value; 
            const systemQty = parseInt(document.getElementById('inv-system-qty').value); 
            const actualQty = parseInt(document.getElementById('inv-actual-qty').value); 
            if (pendingInventoryItems.some(p => p.itemId === itemId)) { showNotification("Articolo già aggiunto. Rimuovilo per modificarlo."); return; }
            if(isNaN(actualQty) || actualQty < 0) { showNotification("Quantità non valida"); return; }
            if(systemQty === actualQty) { showNotification("Nessuno scostamento: giacenza già corretta"); return; }
            pendingInventoryItems.push({ itemId, systemQty, actualQty }); 
        };

        window.finalizeInventory = () => {
            const dateStr = new Date().toLocaleDateString('it-IT'); let successCount = 0;

                const item = state.items.find(i => i.id === p.itemId); 
                if (item) { 
                    const diff = p.actualQty - p.systemQty;
                    item.currentStock = p.actualQty; 
                    const moveType = diff > 0 ? 'IN' : 'OUT';
                    state.movements.push({ id: 'mv-inv-' + Date.now() + Math.random(), itemId: p.itemId, type: moveType, quantity: Math.abs(diff), price: item.lastPrice, documentRef: 'Rettifica Inventario', date: dateStr });

                } 
            });

                item.name = d.get('name');
                item.seasonId = d.get('seasonId');
                item.categoryId = d.get('categoryId');
                item.uomId = d.get('uomId');
                item.lastPrice = parseFloat(d.get('price'));
                item.sellingPrice = parseFloat(d.get('sellingPrice'));
                item.reorderLevel = parseInt(d.get('reorderLevel'));
                
                window.saveData(true, "Modifica Articolo"); 
                window.closeModal(); 
                window.render();
            };
        };

        window.requestDeleteItem = function(id, name) { 
            window.openModal(`
                <div class="text-center p-4">
                    <h3 class="font-bold mb-4 italic text-slate-800 dark:text-white">Eliminare definitivamente l'articolo selezionato?</h3>
                    <div class="flex gap-3">
                        <button onclick="closeModal()" class="flex-1 px-4 py-2 border border-slate-200 dark:border-slate-600 rounded-xl font-medium hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 transition-colors">No</button>
                        <button onclick="state.items=state.items.filter(i=>i.id!=='${id}');saveData(true,'Elimina item');closeModal();render()" class="flex-1 bg-red-600 text-white py-2 rounded-xl font-bold shadow-lg">Sì, elimina</button>
                    </div>
                </div>`); 
        };

        window.requestDeleteMaster = function(type, id, name) {
            const isUsed = (type==='categories' && state.items.some(i=>i.categoryId===id)) || 
                           (type==='outlets' && state.movements.some(m=>m.outletId===id)) || 
                           (type==='seasons' && state.items.some(i=>i.seasonId===id)) || 
                           (type==='suppliers' && state.bolle.some(b=>b.supplierId===id)) || 
                           (type==='documentTypes' && state.bolle.some(b=>b.docTypeId===id));
            if(isUsed) { window.showNotification("Impossibile eliminare: anagrafica in uso!"); return; }
            window.openModal(`
                <div class="text-center p-4">
                    <h3 class="font-bold mb-4 italic text-slate-800 dark:text-white">Rimuovere ${name}?</h3>
                    <div class="flex gap-3">
                        <button onclick="closeModal()" class="flex-1 px-4 py-2 border border-slate-200 dark:border-slate-600 rounded-xl font-medium hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 transition-colors">No</button>
                        <button onclick="state['${type}']=state['${type}'].filter(x=>x.id!=='${id}');saveData(true,'Elimina master');closeModal();render()" class="flex-1 bg-red-600 text-white py-2 rounded-xl font-bold shadow-md md:font-extrabold">Sì, elimina</button>
                    </div>
                </div>`);
        };

        // --- GESTIONE UTENTI ---
        window.openUserModal = function(id = null) {
            const user = id ? state.users.find(u => u.id === id) : null;
            window.openModal(`
                <div class="flex justify-between items-center mb-6 text-left">
                    <h3 class="text-xl font-bold text-slate-800 dark:text-white">${id ? 'Modifica Utente' : 'Nuovo Utente'}</h3>
                    <button onclick="closeModal()"><i data-lucide="x" class="text-slate-400"></i></button>
                </div>
                <form id="user-form" class="space-y-4 text-left">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Username</label>
                        <input type="text" name="username" value="${user ? user.username : ''}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Password</label>
                        <input type="password" name="password" value="${user ? user.password : ''}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ruolo</label>
                        <select name="role" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="Amministratore" ${user?.role === 'Amministratore' ? 'selected' : ''}>Amministratore</option>
                            <option value="Operatore" ${user?.role === 'Operatore' ? 'selected' : ''}>Operatore</option>
                        </select>
                    </div>
                    <div class="flex gap-3 pt-4">
                        <button type="button" onclick="closeModal()" class="flex-1 px-4 py-2 border border-slate-200 dark:border-slate-600 rounded-xl font-semibold hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 transition-colors">Annulla</button>
                        <button type="submit" class="flex-1 bg-slate-800 dark:bg-blue-600 text-white px-4 py-2.5 rounded-xl font-bold shadow-lg">Salva</button>
                    </div>
                </form>`);
            
            document.getElementById('user-form').onsubmit = (e) => {
                e.preventDefault();
                const d = new FormData(e.target);
                if (id) {
                    const idx = state.users.findIndex(u => u.id === id);
                    state.users[idx] = { ...state.users[idx], username: d.get('username'), password: d.get('password'), role: d.get('role') };
                } else {
                    state.users.push({ id: 'u-'+Date.now(), username: d.get('username'), password: d.get('password'), role: d.get('role') });
                }
                window.saveData(true, "Gestione Utenti"); window.closeModal(); window.render();
            };
        };

        window.requestDeleteUser = function(id, name) {
            if (state.users.length <= 1) { window.showNotification("Impossibile eliminare l'ultimo utente!"); return; }
            if (currentUser && currentUser.id === id) { window.showNotification("Non puoi eliminare l'utente connesso!"); return; }
            window.openModal(`
                <div class="text-center p-4">
                    <div class="bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="alert-triangle" class="w-8 h-8"></i>
                    </div>
                    <h3 class="text-xl font-bold mb-2 text-slate-800 dark:text-white">Elimina Utente</h3>
                    <p class="text-slate-500 dark:text-slate-400 mb-6 text-sm italic">Rimuovere l'accesso per <b>${name}</b>?</p>
                    <div class="flex gap-3">
                        <button onclick="closeModal()" class="flex-1 px-4 py-2 border border-slate-200 dark:border-slate-600 rounded-xl font-medium hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 transition-colors">Annulla</button>
                        <button onclick="state.users=state.users.filter(u=>u.id!=='${id}');saveData(true,'Elimina Utente');closeModal();render()" class="flex-1 bg-red-600 text-white py-2 rounded-xl font-bold shadow-lg">Sì, elimina</button>
                    </div>
                </div>`);
        };

        // --- EXPORT E ORDINI ---
        window.exportDataToCSV = () => {
            if (state.items.length === 0) { window.showNotification("Nessun dato da esportare!"); return; }
            
            const headers = ["ID", "Nome Articolo", "Stagione", "Categoria", "U.M.", "Prezzo Acquisto", "Prezzo Vendita", "Giacenza Attuale", "Soglia Riordino", "Ultimo Fornitore"];
            const rows = state.items.map(item => {
                const inMovements = state.movements.filter(m => m.itemId === item.id && m.type === 'IN' && m.supplierId);
                let lastSupplierName = "Nessuno/Manuale";
                if (inMovements.length > 0) {
                    const lastSupplierId = inMovements[inMovements.length - 1].supplierId;
                    const supplier = state.suppliers.find(s => s.id === lastSupplierId);
                    if (supplier) lastSupplierName = supplier.name;
                }

                return [
                    item.id,
                    `"${item.name.replace(/"/g, '""')}"`, 
                    `"${window.getSeasonName(item.seasonId)}"`,
                    `"${window.getCategoryName(item.categoryId)}"`,
                    `"${window.getUomName(item.uomId)}"`,
                    item.lastPrice || 0,
                    item.sellingPrice || 0,
                    item.currentStock || 0,
                    item.reorderLevel || 0,
                    `"${lastSupplierName.replace(/"/g, '""')}"`
                ].join(";"); 
            });

            const csvContent = headers.join(";") + "\n" + rows.join("\n");
            const bom = "\uFEFF"; 
            const blob = new Blob([bom + csvContent], { type: 'text/csv;charset=utf-8;' });
            
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `HotelStock_Anagrafica_${new Date().toLocaleDateString('it-IT').replace(/\//g, '-')}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            window.showNotification("Esportazione CSV completata");
        };

        window.openOrderGenerationModal = () => {
            const filteredItems = state.dashboardFilter === 'current' ? state.items.filter(i => i.seasonId === state.currentSeasonId) : state.items;
            const lowStockItems = filteredItems.filter(i => i.currentStock <= i.reorderLevel);

            if (lowStockItems.length === 0) {
                window.showNotification("Nessun articolo sottoscorta.");
                return;
            }

            const ordersBySupplier = {};

            lowStockItems.forEach(item => {
                const inMovements = state.movements.filter(m => m.itemId === item.id && m.type === 'IN' && m.supplierId);
                let lastSupplierId = "unknown";
                let lastSupplierName = "Fornitore Non Assegnato / Manuale";

                if (inMovements.length > 0) {
                    lastSupplierId = inMovements[inMovements.length - 1].supplierId;
                    const supplier = state.suppliers.find(s => s.id === lastSupplierId);
                    if (supplier) lastSupplierName = supplier.name;
                }

                if (!ordersBySupplier[lastSupplierId]) {
                    ordersBySupplier[lastSupplierId] = {
                        supplierName: lastSupplierName,
                        items: []
                    };
                }

                const suggestedQty = Math.max((item.reorderLevel * 2) - item.currentStock, 1);

                ordersBySupplier[lastSupplierId].items.push({
                    ...item,
                    suggestedQty: suggestedQty
                });
            });

            let htmlContent = `
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h3 class="text-xl font-bold text-slate-800 dark:text-white tracking-tight">Proposte d'Ordine</h3>
                        <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">Articoli Sottoscorta divisi per Ultimo Fornitore</p>
                    </div>
                    <button onclick="closeModal()"><i data-lucide="x" class="text-slate-400"></i></button>
                </div>
                <div class="max-h-[60vh] overflow-y-auto custom-scrollbar pr-2 space-y-6 mb-6">
            `;

            Object.entries(ordersBySupplier).forEach(([supplierId, order]) => {
                const safeNameForAttr = order.supplierName.replace(/"/g, '&quot;');
                const safeNameForJS = order.supplierName.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                
                htmlContent += `
                    <div class="bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden shadow-sm">
                        <div class="bg-blue-50/50 dark:bg-blue-900/20 px-4 py-3 border-b border-blue-100 dark:border-blue-900 flex justify-between items-center">
                            <h4 class="font-bold text-blue-800 dark:text-blue-400 text-xs uppercase flex items-center gap-2"><i data-lucide="truck" class="w-4 h-4 text-blue-500"></i> ${order.supplierName}</h4>
                            <div class="flex gap-2">
                                <button onclick="sendOrderEmail('${supplierId}', '${safeNameForJS}')" class="text-[10px] bg-blue-600 text-white px-3 py-1.5 rounded-lg hover:bg-blue-700 font-bold transition-all flex items-center gap-1 shadow-sm"><i data-lucide="file-text" class="w-3 h-3"></i> Genera Testo</button>
                                <button onclick="copyOrderToClipboard('${safeNameForJS}')" class="text-[10px] bg-white dark:bg-slate-800 border border-blue-200 dark:border-blue-700 text-blue-700 dark:text-blue-400 px-3 py-1.5 rounded-lg hover:bg-blue-50 dark:hover:bg-slate-700 font-bold transition-all flex items-center gap-1 shadow-sm" title="Copia testo ordine"><i data-lucide="copy" class="w-3 h-3"></i></button>
                            </div>
                        </div>
                        <table class="w-full text-left text-xs">
                            <thead class="text-[9px] uppercase text-slate-400 dark:text-slate-500 border-b border-slate-100 dark:border-slate-700">
                                <tr><th class="px-4 py-2">Articolo</th><th class="px-4 py-2 text-center">Giacenza</th><th class="px-4 py-2 text-center text-blue-600 dark:text-blue-400 font-bold">Q.tà Suggerita</th></tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100 dark:divide-slate-700/50 bg-white dark:bg-slate-800">
                                ${order.items.map(item => `
                                    <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/50">
                                        <td class="px-4 py-2 font-bold text-slate-700 dark:text-slate-200">${item.name}</td>
                                        <td class="px-4 py-2 text-center text-red-500 dark:text-red-400 font-bold">${item.currentStock}</td>
                                        <td class="px-4 py-2 text-center">
                                            <input type="number" value="${item.suggestedQty}" min="1" class="w-16 text-center border border-slate-200 dark:border-slate-600 rounded py-1 text-blue-600 dark:text-blue-400 font-bold focus:ring-2 focus:ring-blue-500 outline-none order-qty-input shadow-inner bg-slate-50 dark:bg-slate-900" data-supplier="${safeNameForAttr}" data-item="${item.name.replace(/"/g, '&quot;')}">
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            });

            htmlContent += `
                </div>
                <div class="flex justify-end gap-3 border-t border-slate-100 dark:border-slate-700 pt-4">
                    <button onclick="closeModal()" class="px-6 py-2.5 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-700 transition-colors shadow-lg">Chiudi Pannello</button>
                </div>
            `;

            window.openModal(htmlContent);
        };

        window.copyOrderToClipboard = (supplierName) => {
            const safeSupplierName = supplierName.replace(/"/g, '\\"');
            const inputs = document.querySelectorAll(`.order-qty-input[data-supplier="${safeSupplierName}"]`);
            let text = `ORDINE PER: ${supplierName}\nDATA: ${new Date().toLocaleDateString('it-IT')}\n\n`;
            
            let hasItems = false;
            inputs.forEach(input => {
                const itemName = input.getAttribute('data-item');
                const qty = input.value;
                if(parseInt(qty) > 0) {
                    text += `- ${qty}x ${itemName}\n`;
                    hasItems = true;
                }
            });

            if(!hasItems) {
                window.showNotification("Nessuna quantità inserita!");
                return;
            }

            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                window.showNotification("Copiato! Pronto per Email/WhatsApp");
            } catch (err) {
                window.showNotification("Errore durante la copia.");
            }
            document.body.removeChild(textArea);
        };

        window.sendOrderEmail = (supplierId, supplierName) => {
            const supplier = state.suppliers.find(s => s.id === supplierId);
            const supplierEmail = supplier && supplier.email ? supplier.email : "[Email non specificata]";
            
            const safeSupplierName = supplierName.replace(/"/g, '\\"');
            const inputs = document.querySelectorAll(`.order-qty-input[data-supplier="${safeSupplierName}"]`);
            
            let hasItems = false;
            let orderItemsText = "";
            
            inputs.forEach(input => {
                const itemName = input.getAttribute('data-item');
                const qty = input.value;
                if(parseInt(qty) > 0) {
                    orderItemsText += `- ${qty} pz x ${itemName}\n`;
                    hasItems = true;
                }
            });

            if(!hasItems) {
                window.showNotification("Nessuna quantità inserita!");
                return;
            }

            const subject = `Ordine Fornitura - ${new Date().toLocaleDateString('it-IT')}`;
            const bodyText = `A: ${supplierEmail}\nOggetto: ${subject}\n\nBuongiorno,\n\nCon la presente vi trasmettiamo il nostro ordine di fornitura:\n\n${orderItemsText}\nRestiamo in attesa di una vostra gentile conferma di ricezione e dei tempi di consegna.\n\nCordiali saluti,\nLa Direzione`;

            window.openModal(`
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h3 class="text-xl font-bold text-slate-800 dark:text-white tracking-tight">Anteprima Email</h3>
                        <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">Copia e incolla nel tuo client di posta</p>
                    </div>
                    <button onclick="openOrderGenerationModal()"><i data-lucide="x" class="text-slate-400"></i></button>
                </div>
                <textarea id="generated-email-text" class="w-full h-64 p-4 text-sm border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 mb-6 custom-scrollbar" readonly>${bodyText}</textarea>
                <div class="flex gap-3">
                    <button onclick="openOrderGenerationModal()" class="flex-1 px-4 py-3 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-xl font-semibold hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">Indietro</button>
                    <button onclick="copyGeneratedEmail()" class="flex-1 bg-blue-600 text-white px-4 py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition-colors flex justify-center items-center gap-2"><i data-lucide="copy" class="w-4 h-4"></i> Copia Tutto</button>
                </div>
            `);
            if (typeof lucide !== 'undefined') lucide.createIcons();
        };

        window.copyGeneratedEmail = () => {
            const textArea = document.getElementById("generated-email-text");
            textArea.select();
            try {
                document.execCommand('copy');
                window.showNotification("Testo copiato negli appunti!");
            } catch (err) {
                window.showNotification("Errore durante la copia.");
            }
        };

        // --- INTEGRAZIONE GOOGLE SHEETS CLOUD ---
        const GOOGLE_WEB_APP_URL = ""; 

        window.onload = () => {
            if (GOOGLE_WEB_APP_URL && GOOGLE_WEB_APP_URL.startsWith("http")) {
                fetch(GOOGLE_WEB_APP_URL)
                    .then(res => res.json())
                    .then(result => {
                        if (result.status === 'success' && result.data) {
                            window.initCloudData(result.data);
                        } else {
                            window.initCloudData(null);
                        }
                    })
                    .catch(err => {
                        console.error("Errore fetch Google Sheets", err);
                        window.initCloudData(null); 
                    });
            } else {
                console.warn("Nessun link Google Sheets inserito. Avvio in modalità Offline/Locale.");
                window.initCloudData(null);
            }
        };

        window.onSaveToCloud = async (newState) => {
            if (GOOGLE_WEB_APP_URL && GOOGLE_WEB_APP_URL.startsWith("http")) {
                try {
                    const response = await fetch(GOOGLE_WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({ state: newState }),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    const result = await response.json();
                    if (result.status !== 'success') {
                        console.error("Errore dal server Google:", result.message);
                        if(typeof window.showNotification === 'function') window.showNotification("Errore di scrittura su Foglio Google.");
                    }
                } catch (e) {
                    console.error("Salvataggio su Google Sheets fallito", e);
                    if(typeof window.showNotification === 'function') window.showNotification("Salvataggio cloud fallito. Controlla la connessione.");
                }
            }
        };

    </script>
</body>
</html>
